services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi_backend
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./app:/usr/src/app
    ports:
      - "${FASTAPI_PORT_LOCAL}:${FASTAPI_PORT}"
    command: sh -c "alembic upgrade head && uvicorn main:app --host ${FASTAPI_HOST} --port ${FASTAPI_PORT} --reload"
    restart: unless-stopped
    networks:
      - dev
  database:
    image: postgres:18-alpine
    container_name: back_database
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT_LOCAL}:${POSTGRES_PORT}"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      start_period: 5s
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - dev
  redis:
    image: redis:8-alpine
    container_name: cache_redis
    volumes:
      - redis:/data
    ports:
      - "${REDIS_PORT_LOCAL}:${REDIS_PORT}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 5s
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - dev

volumes:
  pg_data:

  redis:

networks:
  dev:
