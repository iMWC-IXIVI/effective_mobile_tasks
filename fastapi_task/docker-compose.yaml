services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi_backend
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      prometheus:
        condition: service_started
      grafana:
        condition: service_started
    env_file: .env
    volumes:
      - ./app:/usr/src/app
    ports:
      - "${FASTAPI_PORT_LOCAL}:${FASTAPI_PORT}"
    command: sh -c "alembic upgrade head && gunicorn main:app -w ${COUNTER_WORKERS} -k uvicorn.workers.UvicornWorker -b ${FASTAPI_HOST}:${FASTAPI_PORT} --reload"
    restart: unless-stopped
    networks:
      - dev
  database:
    image: postgres:18-alpine
    container_name: back_database
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT_LOCAL}:${POSTGRES_PORT}"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      start_period: 5s
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - dev
  redis:
    image: redis:8-alpine
    container_name: cache_redis
    volumes:
      - redis:/data
    ports:
      - "${REDIS_PORT_LOCAL}:${REDIS_PORT}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 5s
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - dev
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "${PROMETHEUS_PORT_LOCAL}:${PROMETHEUS_PORT}"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    restart: unless-stopped
    networks:
      - dev
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "${GRAFANA_PORT_LOCAL}:${GRAFANA_PORT}"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    restart: unless-stopped
    networks:
      - dev

volumes:
  pg_data:

  redis:

networks:
  dev:
