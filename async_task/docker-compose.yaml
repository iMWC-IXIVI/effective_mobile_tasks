services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python_downloader
    volumes:
      - ./app:/usr/src/app
    restart: unless-stopped
    env_file: ./.env
    depends_on:
      database:
        condition: service_healthy
    command: sh -c "python main.py"
    networks:
      - dev
  database:
    image: postgres:18-alpine
    container_name: database_pg
    volumes:
      - pg_data:/var/lib/postgresql
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_LOCAL_PORT}:${DB_PORT}"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${DB_NAME}"]
      start_period: 5s
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - dev

volumes:
  pg_data:

networks:
  dev:
